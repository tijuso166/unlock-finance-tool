version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: festivalfinance
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: festivalfinance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festivalfinance"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEMBER_PASSWORD: ${MEMBER_PASSWORD}
      TREASURER_PASSWORD: ${TREASURER_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      FESTIVAL_YEAR: ${FESTIVAL_YEAR:-2025}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
  uploads_data:
